<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Checks - Flashover</title>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var brigadeId = params.get("brigadeId") ||
        localStorage.getItem("selectedBrigadeId") ||
        localStorage.getItem("activeBrigadeId") ||
        "";
      var applianceId = params.get("applianceId") ||
        localStorage.getItem("selectedApplianceId") ||
        "";
      var target = brigadeId && applianceId
        ? "/app.html#/check/" + encodeURIComponent(brigadeId) + "/" + encodeURIComponent(applianceId)
        : "/app.html#/checks";
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Opening checks...</p>
</body>
</html>
