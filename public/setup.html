<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Appliance Setup - Flashover</title>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var applianceId = params.get("applianceId") || localStorage.getItem("selectedApplianceId") || "";
      var target = applianceId
        ? "/app.html#/setup/" + encodeURIComponent(applianceId)
        : "/app.html#/setup";
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Opening appliance setup...</p>
</body>
</html>
