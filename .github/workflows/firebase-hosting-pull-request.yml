name: Deploy to Firebase Hosting on PR
'on': pull_request
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Function Dependencies
        run: npm ci
        working-directory: ./functions

      - name: Create Extension Env File
        run: |
          mkdir -p extensions
          echo "${{ secrets.FIRESTORE_SEND_EMAIL_ENV }}" > extensions/firestore-send-email.env

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLASHOVERAPPLICATION }}'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy API Function
        run: firebase deploy --only functions:api --project flashoverapplication --non-interactive

      - name: Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLASHOVERAPPLICATION }}'
          projectId: flashoverapplication
